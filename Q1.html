<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="theme-color" content="#050505">
    <title>POL AI | DeepSeek Chat Assistant</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Tajawal', 'sans-serif'] },
                    colors: {
                        brand: { 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb' }
                    }
                }
            }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #050505;
            background-image: radial-gradient(circle at 50% 0%, #1a1d24 0%, #050505 100%);
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
        }
        
        .glass-card {
            background: rgba(15, 17, 21, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 28px;
        }
        
        .chat-message {
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .typing-indicator {
            display: inline-block;
            width: 40px;
        }
        
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3b82f6;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-10px); opacity: 1; }
        }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #1a1d24; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="min-h-screen flex flex-col">
        
        <!-- Header -->
        <header class="glass-card sticky top-0 z-40 mx-4 mt-4 px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="index.html" class="btn-outline text-sm py-2 px-4 flex items-center gap-2" style="background: transparent; border: 1px solid rgba(255,255,255,0.2); border-radius: 24px;">
                    <i class="ph-bold ph-arrow-right"></i>
                    <span>العودة للرئيسية</span>
                </a>
            </div>
            
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-brand-500 to-blue-700 rounded-xl flex items-center justify-center">
                    <i class="ph-fill ph-robot text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-sm">DeepSeek AI</h1>
                    <p class="text-[10px] text-brand-400">مساعد ذكي</p>
                </div>
            </div>
        </header>
        
        <!-- Chat Area -->
        <main class="flex-1 max-w-4xl w-full mx-auto p-6 flex flex-col">
            
            <div id="chatMessages" class="flex-1 glass-card p-6 mb-4 overflow-y-auto" style="height: 500px;">
                <div class="text-center text-gray-500 py-10">
                    <i class="ph-fill ph-chat-dots text-5xl mb-3 block"></i>
                    <p>مرحباً بك في مساعد DeepSeek الذكي!</p>
                    <p class="text-sm mt-2">اسألني أي شيء وسأجيبك بذكاء</p>
                </div>
            </div>
            
            <!-- Input Area -->
            <div class="glass-card p-4 flex gap-3">
                <input type="text" id="messageInput" placeholder="اكتب سؤالك هنا..." class="flex-1 bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-500">
                <button id="sendBtn" class="btn-primary px-6 py-3 rounded-xl flex items-center gap-2">
                    <i class="ph-bold ph-paper-plane-right"></i>
                    <span>إرسال</span>
                </button>
            </div>
            
        </main>
        
        <!-- Footer -->
        <footer class="text-center py-6 border-t border-white/10 mt-8">
            <p class="text-xs text-gray-500">© 2025 <span class="text-brand-400">MSK Organization</span> | DeepSeek AI Assistant</p>
        </footer>
    </div>

    <style>
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            transition: all 0.3s;
            cursor: pointer;
        }
        .btn-primary:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(59,130,246,0.4);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-outline:hover {
            border-color: #3b82f6;
            background: rgba(59,130,246,0.1);
        }
    </style>

    <script>
        // DeepSeek API Configuration
        const DEEPSEEK_API_KEY = "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";
        
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        
        let isLoading = false;
        
        // Load chat history from localStorage
        let chatHistory = JSON.parse(localStorage.getItem('deepseek_chat') || '[]');
        
        function displayMessages() {
            chatMessages.innerHTML = '';
            
            if (chatHistory.length === 0) {
                chatMessages.innerHTML = `
                    <div class="text-center text-gray-500 py-10">
                        <i class="ph-fill ph-chat-dots text-5xl mb-3 block"></i>
                        <p>مرحباً بك في مساعد DeepSeek الذكي!</p>
                        <p class="text-sm mt-2">اسألني أي شيء وسأجيبك بذكاء</p>
                    </div>
                `;
                return;
            }
            
            chatHistory.forEach(msg => {
                const div = document.createElement('div');
                div.className = `chat-message mb-4 flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`;
                
                if (msg.role === 'user') {
                    div.innerHTML = `
                        <div class="max-w-[80%] bg-gradient-to-l from-brand-500 to-brand-600 rounded-2xl rounded-tl-none px-4 py-3">
                            <p class="text-white text-sm">${escapeHtml(msg.content)}</p>
                        </div>
                    `;
                } else {
                    div.innerHTML = `
                        <div class="max-w-[80%] bg-dark-800 border border-white/10 rounded-2xl rounded-tr-none px-4 py-3">
                            <div class="flex items-center gap-2 mb-2">
                                <i class="ph-fill ph-robot text-brand-400"></i>
                                <span class="text-xs text-brand-400">DeepSeek AI</span>
                            </div>
                            <p class="text-white text-sm leading-relaxed">${escapeHtml(msg.content)}</p>
                        </div>
                    `;
                }
                
                chatMessages.appendChild(div);
            });
            
            // Scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function addTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'chat-message mb-4 flex justify-start';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="bg-dark-800 border border-white/10 rounded-2xl rounded-tr-none px-4 py-3">
                    <div class="flex items-center gap-2 mb-2">
                        <i class="ph-fill ph-robot text-brand-400"></i>
                        <span class="text-xs text-brand-400">DeepSeek AI يكتب</span>
                    </div>
                    <div class="typing-indicator">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }
        
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;
            
            // Add user message
            chatHistory.push({ role: 'user', content: message });
            localStorage.setItem('deepseek_chat', JSON.stringify(chatHistory));
            displayMessages();
            
            messageInput.value = '';
            isLoading = true;
            sendBtn.disabled = true;
            
            addTypingIndicator();
            
            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [
                            { role: 'system', content: 'أنت مساعد ذكي تتحدث باللغة العربية. أنت خبير في جميع المجالات وتساعد المستخدمين بأسلوب مهذب ومفيد.' },
                            ...chatHistory.map(msg => ({ role: msg.role, content: msg.content }))
                        ],
                        temperature: 0.7,
                        max_tokens: 2000
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }
                
                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                removeTypingIndicator();
                
                // Add AI response
                chatHistory.push({ role: 'assistant', content: reply });
                localStorage.setItem('deepseek_chat', JSON.stringify(chatHistory));
                displayMessages();
                
            } catch (error) {
                console.error('Error:', error);
                removeTypingIndicator();
                
                const errorDiv = document.createElement('div');
                errorDiv.className = 'chat-message mb-4 flex justify-start';
                errorDiv.innerHTML = `
                    <div class="max-w-[80%] bg-red-500/20 border border-red-500/30 rounded-2xl rounded-tr-none px-4 py-3">
                        <div class="flex items-center gap-2 mb-2">
                            <i class="ph-fill ph-warning text-red-400"></i>
                            <span class="text-xs text-red-400">خطأ</span>
                        </div>
                        <p class="text-white text-sm">عذراً، حدث خطأ في الاتصال. يرجى المحاولة مرة أخرى.</p>
                    </div>
                `;
                chatMessages.appendChild(errorDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
            
            isLoading = false;
            sendBtn.disabled = false;
        }
        
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // Clear history button (optional)
        function addClearButton() {
            const header = document.querySelector('header .flex:first-child');
            const clearBtn = document.createElement('button');
            clearBtn.className = 'text-xs text-gray-400 hover:text-red-400 transition ml-3';
            clearBtn.innerHTML = '<i class="ph-bold ph-trash"></i> مسح المحادثة';
            clearBtn.onclick = () => {
                if (confirm('هل تريد مسح سجل المحادثة؟')) {
                    chatHistory = [];
                    localStorage.setItem('deepseek_chat', JSON.stringify(chatHistory));
                    displayMessages();
                }
            };
            header.appendChild(clearBtn);
        }
        
        displayMessages();
        addClearButton();
    </script>
</body>
</html>
